market_data:
  source: local_historical
  config: configs/data/historical.local.yaml
  catalog: research_futures
roots:
  - GC
  - SI
symbols:
  - GC
  - SI
start: "2020-01-01T00:00:00Z"
end: "2026-04-10T00:00:00Z"
timeframe: 15m
initial_cash: "100000"
brokerage_model: IBKR_FUTURES
strategy_class: examples.strategies.opening_range_breakout:OpeningRangeBreakoutStrategy
strategy_params:
  symbol: GC
  timeframe: 15m
  mode: breakout
  range_start_et: "08:30"
  session_close_et: "17:00"
  opening_range_minutes: 60
  max_entry_elapsed_minutes: 510
  minutes_before_close_flat: 60
  target_quantity: "1"
  breakout_buffer_ratio: "0"
  stop_range_multiple: "0.75"
  target_range_multiple: "1.25"
  max_holding_bars: 16
  max_entries_per_session: 1
  range_width_lookback_sessions: 20
  range_width_min_history_sessions: 10
  min_range_width_ratio: "0"
  max_range_width_ratio: "3"
cost_model:
  fixed_commission_per_contract: "2.50"
  slippage_bps: "0.25"
risk_config:
  max_notional: "100000000"
roll_policy:
  enabled: true
  method: first_notice_date
  roll_sessions_before_first_notice: 3
warmup_bars: 0
