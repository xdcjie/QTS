market_data:
  source: local_historical
  config: configs/data/historical.local.yaml
  catalog: research_futures
roots:
  - GC
  - SI
  - CARRY
symbols:
  - GC
  - SI
  - GC_CARRY
  - SI_CARRY
instrument_ids:
  GC_CARRY: RESEARCH.CARRY.GC
  SI_CARRY: RESEARCH.CARRY.SI
start: "2020-01-01T00:00:00Z"
end: "2026-04-10T00:00:00Z"
timeframe: 1d
initial_cash: "100000"
brokerage_model: IBKR_FUTURES
strategy_class: examples.strategies.carry_momentum_rotation:CarryMomentumRotationStrategy
strategy_params:
  symbols:
    - GC
    - SI
  carry_symbols:
    GC: GC_CARRY
    SI: SI_CARRY
  timeframe: 1d
  momentum_lookback_bars:
    - 21
    - 63
    - 126
  volatility_lookback_bars: 40
  carry_zscore_lookback_bars: 20
  carry_zscore_weight: "0.02"
  min_score: "0"
  min_relative_score: "0.02"
  target_annual_vol: "0.20"
  max_target_percent: "0.50"
  rebalance_threshold: "0.01"
  history_buffer_bars: 20
cost_model:
  fixed_commission_per_contract: "2.50"
  slippage_bps: "0.25"
risk_config:
  max_notional: "100000000"
roll_policy:
  enabled: true
  method: first_notice_date
  roll_sessions_before_first_notice: 3
warmup_bars: 0
