schema_version: "1"
market_data:
  source: local_historical
  config: configs/data/historical.local.yaml
  catalog: research_futures
roots:
  - GC
  - SI
symbols:
  - GC
  - SI
start: "2020-01-01T00:00:00Z"
end: "2026-04-10T00:00:00Z"
timeframe: 1d
initial_cash: "100000"
brokerage_model: IBKR_FUTURES
strategies:
  - strategy_id: route-g-risk-managed-momentum
    class_path: examples.strategies.dual_momentum_rotation:DualMomentumRotationStrategy
    account_id: acct-backtest
    allocation: "1"
    signal_aggregation_policy: sum_targets
    signal_priority: 0
    signal_weight: "1"
    conflict_group: gc-si-momentum
    params:
      symbols:
        - GC
        - SI
      timeframe: 1d
      lookback_bars: 84
      rebalance_bars: 1
      min_absolute_momentum: "0.05"
      min_relative_momentum: "0.05"
      volatility_lookback_bars: 40
      high_volatility_threshold: "0.25"
      high_volatility_confirmation_bars: 2
      target_quantities:
        GC: "1"
        SI: "1"
      history_buffer_bars: 20
  - strategy_id: route-i-threshold-momentum
    class_path: examples.strategies.dual_momentum_rotation:DualMomentumRotationStrategy
    account_id: acct-backtest
    allocation: "1"
    signal_aggregation_policy: sum_targets
    signal_priority: 0
    signal_weight: "1"
    conflict_group: gc-si-momentum
    params:
      symbols:
        - GC
        - SI
      timeframe: 1d
      lookback_bars: 84
      rebalance_bars: 1
      min_absolute_momentum: "0"
      min_relative_momentum: "0.05"
      volatility_lookback_bars: 40
      target_quantities:
        GC: "1"
        SI: "1"
      history_buffer_bars: 20
cost_model:
  fixed_commission_per_contract: "2.50"
  slippage_bps: "0.25"
risk_config:
  max_notional: "100000000"
roll_policy:
  enabled: true
  method: first_notice_date
  roll_sessions_before_first_notice: 3
warmup_bars: 0
