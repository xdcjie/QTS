market_data:
  source: local_historical
  config: configs/data/historical.local.yaml
  catalog: research_futures
roots:
  - SI
symbols:
  - SI
start: "2020-01-01T00:00:00Z"
end: "2026-04-10T00:00:00Z"
timeframe: 1d
initial_cash: "100000"
strategy_class: examples.strategies.vol_target_trend:VolTargetTrendStrategy
strategy_params:
  symbol: SI
  timeframe: 1d
  momentum_lookback_bars: 63
  volatility_lookback_bars: 20
  target_annual_vol: "0.20"
  max_target_percent: "0.50"
  min_signal_return: "0.03"
  rebalance_threshold: "0.02"
  allow_short: true
cost_model:
  fixed_commission_per_contract: "2.50"
  slippage_bps: "0.25"
risk_config:
  max_notional: "100000000"
roll_policy:
  enabled: true
  method: first_notice_date
  roll_sessions_before_first_notice: 3
warmup_bars: 260
