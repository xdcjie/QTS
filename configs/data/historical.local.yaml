historical_data:
  stores:
    local_csv:
      type: local_csv
      root_dir: historical
      bars_dir: data
      chains_dir: chains
      bars_file_template: "{root_lower}.csv"
      chain_file_template: "{root}.json"
      defaults:
        schema: databento_ohlcv
        exchange_timezone: US/Eastern
        timezone_policy: source_utc_exchange_sessions
        normalization: raw
  schemas:
    databento_ohlcv:
      timestamp: ts_event
      symbol: symbol
      instrument_id: instrument_id
      open: open
      high: high
      low: low
      close: close
      volume: volume
  catalogs:
    research_futures:
      store: local_csv
      datasets:
        GC:
          asset_class: future
          exchange: CME
          chain_file: GC.json
          bars:
            - file: gc.csv
              timeframe: 1m
        SI:
          asset_class: future
          exchange: CME
          chain_file: SI.json
          bars:
            - file: si.csv
              timeframe: 1m
        CARRY:
          asset_class: research_signal
          bars:
            - file: carry.csv
              timeframe: 1d
              exchange_timezone: US/Eastern
              timezone_policy: source_utc_exchange_sessions
              normalization: calendar_spread_carry_signal_v1
              session_window:
                exchange_timezone: US/Eastern
                open_time: "18:00"
                close_time: "17:00"
