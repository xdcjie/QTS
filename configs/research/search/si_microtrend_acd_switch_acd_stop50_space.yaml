parameters:
  - name: symbol
    parameter_type: categorical
    values: [SI]
  - name: timeframe
    parameter_type: categorical
    values: [3m]
  - name: micro_entry_return_threshold
    parameter_type: categorical
    values: ["0.00050"]
  - name: micro_min_volume_ratio
    parameter_type: categorical
    values: ["1.25"]
