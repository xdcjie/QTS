# GC 15m VWAP transfer check: SI sigma115_or_ma027 candidate on GC.
#
# Research evidence only. This checks both a GC-native use of the sigma/MA
# escape and a literal SI slope_020 transfer so the results do not conflate
# feature portability with product-specific baseline structure.

version: 1
workflow_id: vwap-factor-gc-15m-sigma115-ma027-transfer
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.vwap_factor_research_gc_15m_long_is.yaml
    output_root: ../../../runs/research/vwap/gc-15m-long/sigma115-ma027-transfer
    summary_output: ../../../runs/research/vwap/gc-15m-long/validation/sigma115-ma027-transfer.json
    metrics: [total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    base_strategy_params:
      symbol: GC
      time_window: asia_20_02
      target_quantity: "4"
      min_volume_ratio: "1.3"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "2.0"
      bad_regime_rule: hard_churn225
      bad_regime_unready_policy: allow
      vwap_acceptance_min: "0.75"
    periods:
      - name: anchor_y2011
        start: 2011-01-01
        end: 2012-01-01
      - name: anchor_y2016
        start: 2016-01-01
        end: 2017-01-01
      - name: anchor_y2020
        start: 2020-01-01
        end: 2021-01-01
      - name: anchor_y2021
        start: 2021-01-01
        end: 2022-01-01
      - name: failure_2022_2024
        start: 2022-01-01
        end: 2025-01-01
      - name: report_2025_2026
        start: 2025-01-01
        end: 2026-04-10
    candidates:
      - name: gc_native_baseline
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_acceptance_if_bad_regime]
      - name: gc_native_sigma115_or_ma027
        strategy_params:
          factor_filters: [session_sigma_or_ma20_80_min, mom120_aligned, vwap_acceptance_if_bad_regime]
          session_sigma_min_atr: "1.15"
          ma20_80_min_abs: "0.27"
      - name: si_slope020_sigma115_or_ma027
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_or_ma20_80_min, vwap_slope_strength, vwap_acceptance_if_bad_regime]
          session_sigma_min_atr: "1.15"
          ma20_80_min_abs: "0.27"
          vwap_slope_min_atr: "0.20"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/gc-15m-long/reports
    output_path: vwap-factor-gc-15m-sigma115-ma027-transfer-report.md
