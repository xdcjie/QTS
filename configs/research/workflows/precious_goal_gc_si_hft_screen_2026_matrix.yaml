      - name: si_orb_vwap_1m_15m_trail
        strategy_params: {symbol: SI, timeframe: 1m, opening_range_minutes: 15, max_holding_bars: 45, target_quantity: "1", exit_on_vwap_cross: true, exit_on_trend_reversal: true, use_trailing_stop: true, trailing_atr_multiple: "2.0"}
      - name: si_orb_vwap_2m_30m_trail
