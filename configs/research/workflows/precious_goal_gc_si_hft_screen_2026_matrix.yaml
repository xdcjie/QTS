version: 1
workflow_id: precious-goal-gc-si-hft-screen-2026-matrix
periods:
  screen_2026:
    start: "2026-01-01T00:00:00+00:00"
    end: "2026-05-22T20:20:00+00:00"
    role: selection
steps:
  - id: implementation_orb_vwap_trend
    kind: implementation_gate
    required_modules:
      - strategies.research.orb_vwap_trend_filter
    required_strategy: strategies.research.orb_vwap_trend_filter:OrbVwapTrendFilterStrategy
    on_fail: stop

  - id: implementation_microtrend
    kind: implementation_gate
    required_modules:
      - strategies.research.precious_metal_microtrend_scalper
    required_strategy: strategies.research.precious_metal_microtrend_scalper:PreciousMetalMicrotrendScalperStrategy
    on_fail: stop

  - id: implementation_vwap_reversion
    kind: implementation_gate
    required_modules:
      - strategies.research.precious_metal_vwap_reversion_scalper
    required_strategy: strategies.research.precious_metal_vwap_reversion_scalper:PreciousMetalVwapReversionScalperStrategy
    on_fail: stop

  - id: implementation_opening_range_acd
    kind: implementation_gate
    required_modules:
      - strategies.research.precious_metal_opening_range_acd
    required_strategy: strategies.research.precious_metal_opening_range_acd:PreciousMetalOpeningRangeAcdStrategy
    on_fail: stop

  - id: implementation_intraday_momentum
    kind: implementation_gate
    required_modules:
      - strategies.research.precious_metal_intraday_momentum
    required_strategy: strategies.research.precious_metal_intraday_momentum:PreciousMetalIntradayMomentumStrategy
