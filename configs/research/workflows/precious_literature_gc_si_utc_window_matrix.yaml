version: 1
workflow_id: precious-literature-gc-si-utc-window-matrix
periods:
  train_2024:
    start: "2024-01-01T00:00:00+00:00"
    end: "2025-01-01T00:00:00+00:00"
    role: selection
  oos_2025_2026:
    start: "2025-01-01T00:00:00+00:00"
    end: "2026-05-22T20:20:00+00:00"
    role: validation
steps:
  - id: implementation_utc_window
    kind: implementation_gate
    required_modules:
      - strategies.research.precious_metal_utc_window
    required_strategy: strategies.research.precious_metal_utc_window:PreciousMetalUtcWindowStrategy
    on_fail: stop

  - id: utc_window_matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.precious_metal_utc_window_gc_si.yaml
    output_root: ../../../runs/research/precious_literature_gc_si/utc_window_matrix
    summary_output: ../../../runs/research/precious_literature_gc_si/utc_window_matrix/summary.json
    periods:
      - train_2024
      - oos_2025_2026
    metrics:
      - total_return
      - sharpe_ratio
      - max_drawdown
      - profit_factor
      - total_trades
      - win_rate
      - expectancy
      - time_in_market
    candidates:
      - name: gc_si_utc20_6h
        strategy_params:
          symbols: [GC, SI]
          start_hour_utc: 20
          duration_hours: 6
          target_quantities:
            GC: "1"
            SI: "1"
      - name: gc_si_utc18_8h
        strategy_params:
          symbols: [GC, SI]
          start_hour_utc: 18
          duration_hours: 8
          target_quantities:
            GC: "1"
            SI: "1"
      - name: gc_utc20_6h
        strategy_params:
          symbols: [GC]
          start_hour_utc: 20
          duration_hours: 6
          target_quantities:
            GC: "1"
      - name: si_utc20_6h
        strategy_params:
          symbols: [SI]
          start_hour_utc: 20
          duration_hours: 6
          target_quantities:
            SI: "1"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/precious_literature_gc_si/reports
