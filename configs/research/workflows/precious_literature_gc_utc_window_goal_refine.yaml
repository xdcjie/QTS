    output_root: ../../../runs/research/precious_literature_gc_si/gc_utc_window_goal_refine
    summary_output: ../../../runs/research/precious_literature_gc_si/gc_utc_window_goal_refine/summary.json
    materialized_replay_cache:
      enabled: true
      cache_dir: ../../../runs/research/precious_literature_gc_si/replay_cache/gc_utc_goal
    periods:
      - train_2024
      - oos_2025_2026
    metrics:
      - total_return
      - sharpe_ratio
      - max_drawdown
      - profit_factor
      - total_trades
      - win_rate
      - expectancy
      - time_in_market
    candidates:
