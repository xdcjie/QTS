# SI 15m VWAP feature ablation workflow.
#
# This workflow keeps the current best SI core pullback parameters fixed and
# compares online, local entry filters before promoting any feature into the
# broader optimizer grid.

version: 1
workflow_id: vwap-factor-si-15m-feature-ablation
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: feature-ablation
    kind: optimize
    objective_metric: sharpe_ratio
    output_root: ../../../runs/research/vwap/si-15m-long/feature-ablation
    validation_output: ../../../runs/research/vwap/si-15m-long/validation/feature-ablation.json
    capital_metrics:
      margin_proxy: "15000"
    validation:
      constraints:
        - metric: total_trades
          operator: ">="
          threshold: "10"
        - metric: pnl_usd
          operator: ">"
          threshold: "0"
        - metric: sharpe_ratio
          operator: ">="
          threshold: "0"
      failure_window_veto:
        top_n: 5
        require_passing_candidate: false
        output_root: ../../../runs/research/vwap/si-15m-long/feature-ablation/failure-veto
        summary_output: ../../../runs/research/vwap/si-15m-long/validation/feature-ablation-failure-veto.json
        windows:
          - name: failure-2022
            start: 2022-01-01
            end: 2023-01-01
          - name: failure-2023
            start: 2023-01-01
            end: 2024-01-01
          - name: failure-2024
            start: 2024-01-01
            end: 2025-01-01
        constraints:
          - metric: pnl_usd
            operator: ">"
            threshold: "0"
          - metric: max_drawdown
            operator: "<="
            threshold: "0.05"
        report_only_windows:
          - name: report-2025-2026
            start: 2025-01-01
            end: 2026-04-10
      walk_forward:
        top_n: 5
        output_root: ../../../runs/research/vwap/si-15m-long/feature-ablation/walk-forward
        summary_output: ../../../runs/research/vwap/si-15m-long/validation/feature-ablation-walk-forward.json
        robustness:
          phases: [test]
          min_windows: 1
          max_losing_windows: 0
          min_window_pnl_usd: "0"
          min_window_best_objective: "0"
          min_total_pnl_usd: "1"
        splits:
          - name: primary-oos-2023-2026
            train_start: 2010-06-06
            train_end: 2023-01-01
            test_start: 2023-01-01
            test_end: 2026-04-10
    parameters:
      time_window: [asia_20_02]
      target_quantity: ["3"]
      min_volume_ratio: ["1.5"]
      pullback_touch_atr_below: ["0.15"]
      max_pullback_break_atr: ["1.0"]
      stop_atr_multiple: ["1.0"]
      target_r_multiple: ["2.0"]
      factor_filters:
        - [trend_regime_aligned, session_sigma_range]
        - [trend_regime_aligned, session_sigma_range, volume_curve_range]
        - [trend_regime_aligned, session_sigma_range, vwap_acceptance]
        - [trend_regime_aligned, session_sigma_range, range_expansion]
        - [trend_regime_aligned, session_sigma_range, distance_mid]
        - [trend_regime_aligned, session_sigma_range, vwap_acceptance, distance_mid]
        - [trend_regime_aligned, session_sigma_range, range_expansion, distance_mid]
      distance_max_atr: ["1.5"]

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/si-15m-long/reports
    output_path: vwap-factor-si-15m-feature-ablation-report.md
