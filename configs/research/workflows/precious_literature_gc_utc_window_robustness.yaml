version: 1
workflow_id: precious-literature-gc-utc-window-robustness
periods:
  is_2010_2018:
    start: "2010-06-06T22:00:00+00:00"
    end: "2019-01-01T00:00:00+00:00"
    role: selection
  validation_2019_2023:
    start: "2019-01-01T00:00:00+00:00"
    end: "2024-01-01T00:00:00+00:00"
    role: validation
  oos_2024_2026:
    start: "2024-01-01T00:00:00+00:00"
    end: "2026-05-22T20:20:00+00:00"
    role: validation
steps:
  - id: implementation_utc_window
    kind: implementation_gate
    required_modules:
      - strategies.research.precious_metal_utc_window
    required_strategy: strategies.research.precious_metal_utc_window:PreciousMetalUtcWindowStrategy
    on_fail: stop

  - id: gc_utc_window_robustness
    kind: backtest_matrix
    backtest_config: ../../backtest.precious_metal_utc_window_gc.yaml
    output_root: ../../../runs/research/precious_literature_gc_si/gc_utc_window_robustness
    summary_output: ../../../runs/research/precious_literature_gc_si/gc_utc_window_robustness/summary.json
    periods:
      - is_2010_2018
      - validation_2019_2023
      - oos_2024_2026
    metrics:
      - total_return
      - sharpe_ratio
      - max_drawdown
      - profit_factor
      - total_trades
      - win_rate
      - expectancy
      - time_in_market
    candidates:
      - name: gc_utc20_6h_frozen
        strategy_params:
          symbols: [GC]
          start_hour_utc: 20
          duration_hours: 6
          target_quantities:
            GC: "1"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/precious_literature_gc_si/reports
