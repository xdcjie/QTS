# SI 15m VWAP round 19 matrix: session-sigma floor with trend-structure escape.
#
# Research evidence only. Round18 showed session_sigma_min_090 improves 2011,
# 2021, and 2022-2024 but cuts useful 2025-2026 trend trades. This round keeps
# the sigma cap and allows low-sigma entries only when MA20-80 directional
# separation is large enough.

version: 1
workflow_id: vwap-factor-si-15m-round19-sigma-escape
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.vwap_factor_research_si_15m_long_is.yaml
    output_root: ../../../runs/research/vwap/si-15m-long/round19-sigma-escape
    summary_output: ../../../runs/research/vwap/si-15m-long/validation/round19-sigma-escape.json
    metrics: [total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    base_strategy_params:
      symbol: SI
      time_window: asia_20_02
      target_quantity: "3"
      min_volume_ratio: "1.5"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "2.0"
      bad_regime_rule: hard14
      bad_regime_unready_policy: allow
      vwap_acceptance_min: "0.75"
      factor_filters: [trend_regime_aligned, session_sigma_range, vwap_slope_strength, vwap_acceptance_if_bad_regime]
      vwap_slope_min_atr: "0.20"
      session_sigma_min_atr: "0.90"
    periods:
      - name: anchor_y2011
        start: 2011-01-01
        end: 2012-01-01
      - name: anchor_y2021
        start: 2021-01-01
        end: 2022-01-01
      - name: failure_2022_2024
        start: 2022-01-01
        end: 2025-01-01
      - name: report_2025_2026
        start: 2025-01-01
        end: 2026-04-10
    candidates:
      - name: slope_020_sigma_min_090
        strategy_params: {}
      - name: slope_020_sigma090_or_ma019
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_or_ma20_80_min, vwap_slope_strength, vwap_acceptance_if_bad_regime]
          ma20_80_min_abs: "0.19"
      - name: slope_020_sigma090_or_ma023
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_or_ma20_80_min, vwap_slope_strength, vwap_acceptance_if_bad_regime]
          ma20_80_min_abs: "0.23"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/si-15m-long/reports
    output_path: vwap-factor-si-15m-round19-sigma-escape-report.md
