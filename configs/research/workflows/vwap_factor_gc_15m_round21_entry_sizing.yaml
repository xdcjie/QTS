# GC 15m VWAP round 21: entry-time size down for high-noise extended momentum.
#
# Research evidence only. This keeps entries live but reduces quantity when the
# current session is noisy and the trade is already aligned with a strong
# 120-bar move. The goal is to reduce exhaustion/reversal loss without fully
# filtering trend continuation trades.

version: 1
workflow_id: vwap-factor-gc-15m-round21-entry-sizing
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.vwap_factor_research_gc_15m_long_is.yaml
    output_root: ../../../runs/research/vwap/gc-15m-long/round21-entry-sizing
    summary_output: ../../../runs/research/vwap/gc-15m-long/validation/round21-entry-sizing.json
    metrics: [total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    base_strategy_params:
      symbol: GC
      time_window: asia_20_02
      target_quantity: "4"
      min_volume_ratio: "1.3"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "1.5"
      bad_regime_rule: hard14
      bad_regime_unready_policy: allow
      bad_regime_target_r_multiple: "1.5"
      vwap_acceptance_min: "0.75"
      ts_momentum_min_abs: "0.50"
      factor_filters: [session_sigma_range, mom120_aligned, mom120_min, vwap_acceptance_if_bad_regime]
    periods:
      - name: anchor_y2020
        start: 2020-01-01
        end: 2021-01-01
      - name: anchor_y2021
        start: 2021-01-01
        end: 2022-01-01
      - name: failure_2022_2024
        start: 2022-01-01
        end: 2025-01-01
      - name: post_20260410_20260523
        start: 2026-04-10
        end: 2026-05-23
    candidates:
      - name: target150
        strategy_params: {}
      - name: target150_np4_adv050_fav025_exit
        strategy_params:
          early_no_progress_exit_bars: 4
          early_no_progress_adverse_r: "0.50"
          early_no_progress_favorable_r: "0.25"
      - name: target150_size_sigma100_mom200_q2
        strategy_params:
          entry_size_rule: sigma_momentum_reduce
          entry_size_session_sigma_min_atr: "1.00"
          entry_size_momentum_min_abs: "2.00"
          entry_size_reduced_quantity: "2"
      - name: target150_size_sigma120_mom200_q2
        strategy_params:
          entry_size_rule: sigma_momentum_reduce
          entry_size_session_sigma_min_atr: "1.20"
          entry_size_momentum_min_abs: "2.00"
          entry_size_reduced_quantity: "2"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/gc-15m-long/reports
    output_path: vwap-factor-gc-15m-round21-entry-sizing-report.md
