version: 1
workflow_id: precious-literature-gc-si-ma-trend-filter-matrix
periods:
  train_2024:
    start: "2024-01-01T00:00:00+00:00"
    end: "2025-01-01T00:00:00+00:00"
    role: selection
  oos_2025_2026:
    start: "2025-01-01T00:00:00+00:00"
    end: "2026-05-22T20:20:00+00:00"
    role: validation
steps:
  - id: implementation_ma_trend_filter
    kind: implementation_gate
    required_modules:
      - strategies.research.precious_metal_ma_trend_filter
    required_strategy: strategies.research.precious_metal_ma_trend_filter:PreciousMetalMaTrendFilterStrategy
    on_fail: stop

  - id: ma_trend_filter_matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.precious_metal_ma_trend_filter_gc_si.yaml
    output_root: ../../../runs/research/precious_literature_gc_si/ma_trend_filter_matrix
    summary_output: ../../../runs/research/precious_literature_gc_si/ma_trend_filter_matrix/summary.json
    periods:
      - train_2024
      - oos_2025_2026
    metrics:
      - total_return
      - sharpe_ratio
      - max_drawdown
      - profit_factor
      - total_trades
      - win_rate
      - expectancy
      - time_in_market
    candidates:
      - name: si_ma_trend_11_48_15m
        strategy_params:
          symbols: [SI]
          short_window: 11
          long_window: 48
          decision_interval_bars: 15
          entry_spread_bps: "3"
          exit_spread_bps: "0"
          min_holding_bars: 60
          cooldown_bars: 90
      - name: si_ma_trend_30_120_30m
        strategy_params:
          symbols: [SI]
          short_window: 30
          long_window: 120
          decision_interval_bars: 30
          entry_spread_bps: "4"
          exit_spread_bps: "0"
          min_holding_bars: 120
          cooldown_bars: 180
      - name: gc_ma_trend_60_240_30m
        strategy_params:
          symbols: [GC]
          short_window: 60
          long_window: 240
          decision_interval_bars: 30
          entry_spread_bps: "4"
          exit_spread_bps: "0"
          min_holding_bars: 120
          cooldown_bars: 180
      - name: gc_ma_trend_120_480_60m
        strategy_params:
          symbols: [GC]
          short_window: 120
          long_window: 480
          decision_interval_bars: 60
          entry_spread_bps: "5"
          exit_spread_bps: "0"
          min_holding_bars: 240
          cooldown_bars: 240

  - id: report
    kind: research_report
    output_root: ../../../runs/research/precious_literature_gc_si/reports
