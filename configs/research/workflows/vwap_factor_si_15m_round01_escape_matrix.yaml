# SI 15m VWAP round 01 matrix: bad-regime gate with trend escape.
#
# This workflow is research evidence only. Candidate selection must not use
# report_2025_2026 as an objective; that window is a holdout report/veto.

version: 1
workflow_id: vwap-factor-si-15m-round01-escape-matrix
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: matrix
    kind: backtest_matrix
    output_root: ../../../runs/research/vwap/si-15m-long/round01-escape-prefilter
    summary_output: ../../../runs/research/vwap/si-15m-long/validation/round01-escape-prefilter.json
    metrics: [total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    base_strategy_params:
      symbol: SI
      time_window: asia_20_02
      target_quantity: "3"
      min_volume_ratio: "1.5"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "2.0"
    periods:
      - name: failure_2022_2024
        start: 2022-01-01
        end: 2025-01-01
      - name: report_2025_2026
        start: 2025-01-01
        end: 2026-04-10
    candidates:
      - name: base
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_range]
      - name: acceptance_070
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_range, vwap_acceptance]
          vwap_acceptance_min: "0.70"
      - name: range_110
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_range, range_expansion]
          range_expansion_min: "1.10"
      - name: escape_070_110
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_range, vwap_acceptance_or_range_expansion]
          vwap_acceptance_min: "0.70"
          range_expansion_min: "1.10"
      - name: escape_070_120
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_range, vwap_acceptance_or_range_expansion]
          vwap_acceptance_min: "0.70"
          range_expansion_min: "1.20"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/si-15m-long/reports
    output_path: vwap-factor-si-15m-round01-escape-prefilter-report.md
