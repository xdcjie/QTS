    output_root: ../../../runs/research/vwap/route-b/vwap-gc-rolling
    summary_output: ../../../runs/research/vwap/route-b/vwap-gc-rolling-summary.json
    metrics: [compounding_annual_return, total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor, total_commission, total_slippage]
    periods:
      - {name: is_2020_2022, start: "2020-01-01", end: "2022-01-01"}
      - {name: validation_2022_2024, start: "2022-01-01", end: "2024-01-01"}
      - {name: holdout_2024_2026, start: "2024-01-01", end: "2026-04-10"}
      - {name: anchor_2010_2020, start: "2010-06-06", end: "2020-01-01"}
    base_strategy_params:
      symbol: GC
      timeframe: 15m
      time_window: asia_20_02
      target_quantity: "4"
      min_volume_ratio: "1.3"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "2.0"
      bad_regime_rule: hard14
      bad_regime_unready_policy: block
      factor_filters: [session_sigma_range, mom120_aligned]
    candidates:
      - name: vwap_gc_sigma_mom120_vol13
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned]
      - name: vwap_gc_sigma_mom120_volume_vol13
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, volume_curve_range]
      - name: vwap_gc_trend_sigma_slope_accept
        strategy_params:
          factor_filters: [trend_regime_aligned, session_sigma_range, vwap_slope_strength, vwap_acceptance_if_bad_regime]
