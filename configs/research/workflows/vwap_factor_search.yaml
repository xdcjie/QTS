# Standard VWAP research workflow.
#
# The discovery step records source-backed ideas only. Executable evidence still
# uses the implemented VWAP strategy through ResearchSession and BacktestPipeline.

version: 1
workflow_id: vwap-factor-search
steps:
  - id: discover
    kind: factor_candidates
    query: "VWAP trading strategy intraday futures regime filter trend strength volatility timing ATR VWAP slope order flow imbalance opening drive volume curve liquidity returns commodity futures gold"
    sources: [semantic_scholar, openalex, crossref, arxiv]
    max_results: 12
    from_year: 2015
    refresh: true

  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: baseline
    kind: backtest
    backtest_config: ../../backtest.vwap_production_pullback_gc.yaml
    output_dir: ../../../runs/research/vwap/baseline

  - id: structural-candidates
    kind: optimize
    objective_metric: sharpe_ratio
    output_root: ../../../runs/research/vwap/structural-candidates
    validation_output: ../../../runs/research/vwap/validation/structural-candidates.json
    capital_metrics:
      margin_proxy: "12000"
    validation:
      constraints:
        - metric: total_trades
          operator: ">="
          threshold: "3"
        - metric: pnl_usd
          operator: ">"
          threshold: "0"
        - metric: max_drawdown
          operator: "<="
          threshold: "0.05"
        - metric: sharpe_ratio
          operator: ">="
          threshold: "0"
      failure_window_veto:
        top_n: 2
        require_passing_candidate: false
        output_root: ../../../runs/research/vwap/structural-candidates/failure-veto
        summary_output: ../../../runs/research/vwap/validation/structural-candidates-failure-veto.json
        windows:
          - name: failure-2022
            start: 2022-01-01
            end: 2023-01-01
          - name: failure-2023
            start: 2023-01-01
            end: 2024-01-01
          - name: failure-2024
            start: 2024-01-01
            end: 2025-01-01
        report_only_windows:
          - name: report-known-2025
            start: 2025-01-01
            end: 2026-01-01
          - name: true-oos-after-2026-01-01
            start: 2026-01-01
            end: 2027-01-01
        constraints:
          - metric: pnl_usd
            operator: ">"
            threshold: "0"
          - metric: max_drawdown
            operator: "<="
            threshold: "0.05"
    parameters:
      time_window: [full_session]
      timeframe: [1m, 2m, 3m, 5m, 15m]
      entry_size_rule: [risk_budget]
      risk_budget: ["600"]
      risk_budget_point_value: ["100"]
      risk_budget_min_quantity: ["1"]
      risk_budget_max_quantity: ["4"]
      factor_filters:
        - [vwap_acceptance, trend_efficiency, trend_age, session_sigma_range]
        - [vwap_slope_strength, vwap_acceptance, trend_efficiency, trend_age, session_sigma_range]
      trend_efficiency_lookback: [20]
      trend_efficiency_min: ["0.60"]
      trend_age_min_bars: [4]
      trend_age_max_bars: [80]
      vwap_acceptance_window: [20]
      vwap_acceptance_min: ["0.70"]
      min_session_open_minutes: [0]
      min_volume_ratio: ["1.3"]
      pullback_touch_atr_below: ["0.15"]
      max_pullback_break_atr: ["1.0"]
      stop_atr_multiple: ["1.0"]
      exit_style: [partial_runner]
      partial_target_r_multiple: ["1.0"]
      partial_exit_fraction: ["0.50"]
      runner_target_r_multiple: ["2.5"]
      runner_stop_to_breakeven: [true]

  - id: gc-15m-stable-annualized-scale
    kind: backtest_matrix
    backtest_config: ../../backtest.vwap_factor_research_gc_15m_long_is.yaml
    output_root: ../../../runs/research/vwap/gc-15m-long/stable-annualized-scale
    summary_output: ../../../runs/research/vwap/gc-15m-long/validation/stable-annualized-scale.json
    metrics: [compounding_annual_return, total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    periods:
      - {name: selection_2022_2024, start: "2022-01-01", end: "2025-01-01"}
      - {name: report_2025_to_20260410, start: "2025-01-01", end: "2026-04-10"}
      - {name: true_oos_after_2026_01_01, start: "2026-01-01", end: "2027-01-01"}
    base_strategy_params:
      symbol: GC
      timeframe: 15m
      time_window: asia_20_02
      min_volume_ratio: "1.3"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "1.5"
      bad_regime_rule: hard14
      bad_regime_target_r_multiple: "1.5"
      bad_regime_unready_policy: allow
      early_no_progress_exit_bars: 4
      early_no_progress_adverse_r: "0.50"
      early_no_progress_favorable_r: "0.25"
      entry_size_rule: sigma_momentum_reduce
      entry_size_session_sigma_min_atr: "1.00"
      entry_size_momentum_min_abs: "2.00"
      entry_size_reduced_quantity: "1"
      factor_filters: [session_sigma_range, mom120_aligned, mom120_min, vwap_acceptance_if_bad_regime, range_expansion]
      range_expansion_min: "0"
      range_expansion_max: "1.50"
      ts_momentum_min_abs: "1.00"
      vwap_acceptance_min: "0.75"
    candidates:
      - name: q1_np4_range150_mom100_q4
        strategy_params: {target_quantity: "4"}
      - name: q1_np4_range150_mom100_q6
        strategy_params: {target_quantity: "6"}
      - name: q1_np4_range150_mom100_q8
        strategy_params: {target_quantity: "8"}
      - name: q1_np4_range150_mom100_q10
        strategy_params: {target_quantity: "10"}
      - name: q1_np4_range150_mom100_q12
        strategy_params: {target_quantity: "12"}

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/reports
    output_path: vwap-factor-search-report.md

