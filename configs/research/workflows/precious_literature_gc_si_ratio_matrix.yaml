version: 1
workflow_id: precious-literature-gc-si-ratio-matrix
periods:
  train_2024:
    start: "2024-01-01T00:00:00+00:00"
    end: "2025-01-01T00:00:00+00:00"
    role: selection
  oos_2025_2026:
    start: "2025-01-01T00:00:00+00:00"
    end: "2026-05-22T20:20:00+00:00"
    role: validation
steps:
  - id: implementation_ratio_mean_reversion
    kind: implementation_gate
    required_modules:
      - strategies.research.ratio_mean_reversion
    required_strategy: strategies.research.ratio_mean_reversion:RatioMeanReversionStrategy
    on_fail: stop

  - id: ratio_mean_reversion_matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.ratio_mean_reversion_gc_si.yaml
    output_root: ../../../runs/research/precious_literature_gc_si/ratio_mean_reversion_matrix
    summary_output: ../../../runs/research/precious_literature_gc_si/ratio_mean_reversion_matrix/summary.json
    periods:
      - train_2024
      - oos_2025_2026
    metrics:
      - total_return
      - sharpe_ratio
      - max_drawdown
      - profit_factor
      - total_trades
      - win_rate
      - expectancy
      - time_in_market
    candidates:
      - name: ratio_20d_z175_1x1
        strategy_params:
          timeframe: 1d
          lookback_bars: 20
          entry_z: "1.75"
          exit_z: "0.25"
          leg_a_quantity: "1"
          leg_b_quantity: "1"
      - name: ratio_40d_z175_1x1
        strategy_params:
          timeframe: 1d
          lookback_bars: 40
          entry_z: "1.75"
          exit_z: "0.25"
          leg_a_quantity: "1"
          leg_b_quantity: "1"
      - name: ratio_60d_z200_1x1
        strategy_params:
          timeframe: 1d
          lookback_bars: 60
          entry_z: "2.00"
          exit_z: "0.25"
          leg_a_quantity: "1"
          leg_b_quantity: "1"
      - name: ratio_40d_z200_1x2
        strategy_params:
          timeframe: 1d
          lookback_bars: 40
          entry_z: "2.00"
          exit_z: "0.25"
          leg_a_quantity: "1"
          leg_b_quantity: "2"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/precious_literature_gc_si/reports
