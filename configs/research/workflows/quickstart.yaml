# Quickstart gate-based research workflow for scripts/run_research.py.
#
# This runnable smoke starts at reviewed implementation evidence so it can
# complete deterministically from a clean checkout. Factor discovery/review
# templates live beside this file and remain research-only.

version: 1
workflow_id: quickstart-momentum-review
steps:
  - id: implementation
    kind: implementation_gate
    required_modules:
      - examples.strategies.gc_si_momentum
    required_strategy: examples.strategies.gc_si_momentum:GcSiMomentumStrategy
    on_fail: stop

  - id: backtest
    kind: backtest
    strategy_params:
      short_window: 1
      long_window: 2

  - id: optimize
    kind: optimize
    objective_metric: total_return
    validation_output: ../../../runs/research/quickstart/validation/optimizer-summary.json
    parameters:
      short_window: [1, 2]
      long_window: [2, 3]

  - id: report
    kind: research_report
    output_root: ../../../runs/research/quickstart/reports
