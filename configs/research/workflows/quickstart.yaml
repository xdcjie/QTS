# Quickstart gate-based research workflow for scripts/run_research.py.
#
# The workflow can advance research evidence, but it intentionally stops at
# review and implementation gates. Accepted specs are not runtime promotion.

version: 1
workflow_id: quickstart-momentum-review
steps:
  - id: discover
    kind: factor_candidates
    query: "commodity futures momentum carry volatility"
    sources: [semantic_scholar, openalex, crossref, arxiv]
    max_results: 5
    from_year: 2015

  - id: review
    kind: factor_review_gate
    status: accepted
    min_count: 1
    on_fail: stop

  - id: implementation
    kind: implementation_gate
    required_strategy: examples.strategies.gc_si_momentum:GcSiMomentumStrategy
    on_fail: stop

  - id: backtest
    kind: backtest
    strategy_params:
      short_window: 1
      long_window: 2

  - id: optimize
    kind: optimize
    objective_metric: sharpe_ratio
    parameters:
      short_window: [1, 2]
      long_window: [2, 3]
