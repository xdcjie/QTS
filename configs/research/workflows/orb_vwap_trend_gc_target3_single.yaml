version: 1
workflow_id: orb-vwap-trend-gc-target3-single
periods:
  train_2024_2025:
    start: "2024-01-01"
    end: "2026-01-01"
    role: selection
  oos_2026:
    start: "2026-01-01"
    end: "2026-05-22T20:20:00+00:00"
    role: validation
steps:
  - id: implementation
    kind: implementation_gate
    required_modules:
      - strategies.research.orb_vwap_trend_filter
    required_strategy: strategies.research.orb_vwap_trend_filter:OrbVwapTrendFilterStrategy
  - id: gc_target3_single
    kind: backtest_matrix
    backtest_config: ../../../configs/backtest.orb_vwap_trend_gc_si_long.yaml
    output_root: ../../../runs/research/orb_vwap_trend_gc_si_long/gc_target3_single
    periods: [train_2024_2025, oos_2026]
    metrics:
      - total_return
      - sharpe_ratio
      - max_drawdown
      - profit_factor
      - win_rate
      - expectancy
      - total_trades
      - time_in_market
    candidates:
      - name: gc_or60_hold60_trendrev_qty3
        strategy_params:
          symbol: GC
          opening_range_minutes: 60
          max_holding_bars: 60
          exit_on_trend_reversal: true
          exit_on_vwap_cross: true
          target_quantity: "3"
  - id: report
    kind: research_report
