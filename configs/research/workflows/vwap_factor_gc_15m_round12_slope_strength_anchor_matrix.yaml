# GC 15m VWAP round 12 matrix: use VWAP slope strength as trend-efficiency gate.
#
# Research evidence only. Old anchor years are veto checks for generalization.

version: 1
workflow_id: vwap-factor-gc-15m-round12-slope-strength-anchor-matrix
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.vwap_factor_research_gc_15m_long_is.yaml
    output_root: ../../../runs/research/vwap/gc-15m-long/round12-slope-strength-anchor
    summary_output: ../../../runs/research/vwap/gc-15m-long/validation/round12-slope-strength-anchor.json
    metrics: [total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    base_strategy_params:
      symbol: GC
      time_window: asia_20_02
      target_quantity: "4"
      min_volume_ratio: "1.3"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "2.0"
      bad_regime_rule: hard14
      bad_regime_unready_policy: allow
      bad_regime_target_r_multiple: "1.5"
      vwap_acceptance_min: "0.75"
    periods:
      - name: anchor_y2016
        start: 2016-01-01
        end: 2017-01-01
      - name: anchor_y2021
        start: 2021-01-01
        end: 2022-01-01
      - name: failure_2022_2024
        start: 2022-01-01
        end: 2025-01-01
      - name: report_2025_2026
        start: 2025-01-01
        end: 2026-04-10
    candidates:
      - name: bad_accept_075_bad_target15
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_acceptance_if_bad_regime]
      - name: bad_accept_target15_slope_010
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_slope_strength, vwap_acceptance_if_bad_regime]
          vwap_slope_min_atr: "0.10"
      - name: bad_accept_target15_slope_020
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_slope_strength, vwap_acceptance_if_bad_regime]
          vwap_slope_min_atr: "0.20"
      - name: bad_accept_target15_slope_030
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_slope_strength, vwap_acceptance_if_bad_regime]
          vwap_slope_min_atr: "0.30"
      - name: bad_accept_target15_mom_global_050
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, mom120_min, vwap_acceptance_if_bad_regime]
          ts_momentum_min_abs: "0.50"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/gc-15m-long/reports
    output_path: vwap-factor-gc-15m-round12-slope-strength-anchor-report.md
