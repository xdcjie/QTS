# GC 15m VWAP round 05 matrix: lower target R only inside bad regimes.
#
# Research evidence only. report_2025_2026 is a holdout report/veto.

version: 1
workflow_id: vwap-factor-gc-15m-round05-bad-regime-target-matrix
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: matrix
    kind: backtest_matrix
    output_root: ../../../runs/research/vwap/gc-15m-long/round05-bad-regime-target-prefilter
    summary_output: ../../../runs/research/vwap/gc-15m-long/validation/round05-bad-regime-target-prefilter.json
    metrics: [total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    base_strategy_params:
      symbol: GC
      time_window: asia_20_02
      target_quantity: "4"
      min_volume_ratio: "1.3"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "2.0"
    periods:
      - name: failure_2022_2024
        start: 2022-01-01
        end: 2025-01-01
      - name: report_2025_2026
        start: 2025-01-01
        end: 2026-04-10
    candidates:
      - name: base
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned]
      - name: bad_hard14_accept_075
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_acceptance_if_bad_regime]
          bad_regime_rule: hard14
          bad_regime_unready_policy: allow
          vwap_acceptance_min: "0.75"
      - name: bad_hard14_accept_075_bad_target175
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_acceptance_if_bad_regime]
          bad_regime_rule: hard14
          bad_regime_unready_policy: allow
          bad_regime_target_r_multiple: "1.75"
          vwap_acceptance_min: "0.75"
      - name: bad_hard14_accept_075_bad_target15
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_acceptance_if_bad_regime]
          bad_regime_rule: hard14
          bad_regime_unready_policy: allow
          bad_regime_target_r_multiple: "1.5"
          vwap_acceptance_min: "0.75"
      - name: bad_hard14_accept_075_bad_target125
        strategy_params:
          factor_filters: [session_sigma_range, mom120_aligned, vwap_acceptance_if_bad_regime]
          bad_regime_rule: hard14
          bad_regime_unready_policy: allow
          bad_regime_target_r_multiple: "1.25"
          vwap_acceptance_min: "0.75"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/gc-15m-long/reports
    output_path: vwap-factor-gc-15m-round05-bad-regime-target-prefilter-report.md
