    periods:
      - train_2024
      - oos_2025_2026
    metrics:
      - total_return
      - sharpe_ratio
      - max_drawdown
      - profit_factor
      - total_trades
      - win_rate
      - expectancy
      - time_in_market
    candidates:
      - name: carryless_momentum_21_42_rel002
        strategy_params:
          symbols: [GC, SI]
          momentum_lookback_bars: [21, 42]
          volatility_lookback_bars: 40
          carry_zscore_weight: "0"
          min_relative_score: "0.02"
          target_annual_vol: "0.12"
          max_target_percent: "0.25"
      - name: carryless_momentum_21_63_rel001
        strategy_params:
          symbols: [GC, SI]
