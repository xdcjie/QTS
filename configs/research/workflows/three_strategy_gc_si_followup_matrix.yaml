version: 1
workflow_id: three-strategy-gc-si-followup-matrix
periods:
  train_2024:
    start: "2024-01-01T00:00:00+00:00"
    end: "2025-01-01T00:00:00+00:00"
    role: selection
  oos_2025_2026:
    start: "2025-01-01T00:00:00+00:00"
    end: "2026-05-22T20:20:00+00:00"
    role: validation
steps:
  - id: implementation_vol_target_trend
    kind: implementation_gate
    required_modules:
      - strategies.research.vol_target_trend
    required_strategy: strategies.research.vol_target_trend:VolTargetTrendStrategy
    on_fail: stop

  - id: implementation_carry_momentum_rotation
    kind: implementation_gate
    required_modules:
      - strategies.research.carry_momentum_rotation
    required_strategy: strategies.research.carry_momentum_rotation:CarryMomentumRotationStrategy
    on_fail: stop

  - id: implementation_ratio_mean_reversion
    kind: implementation_gate
    required_modules:
      - strategies.research.ratio_mean_reversion
    required_strategy: strategies.research.ratio_mean_reversion:RatioMeanReversionStrategy
    on_fail: stop

  - id: vol_target_trend_followup
    kind: backtest_matrix
    backtest_config: ../../backtest.three_strategy_vol_target_trend_gc_si.yaml
    output_root: ../../../runs/research/three_strategy_gc_si/vol_target_trend_followup
    summary_output: ../../../runs/research/three_strategy_gc_si/vol_target_trend_followup/summary.json
    periods:
      - train_2024
      - oos_2025_2026
    metrics:
      - total_return
      - sharpe_ratio
      - max_drawdown
      - profit_factor
      - total_trades
      - win_rate
      - expectancy
      - time_in_market
    candidates:
      - name: gc_vol_trend_21_63_min005
        strategy_params:
          symbol: GC
          momentum_lookback_bars: [21, 63]
          volatility_lookback_bars: 40
          target_annual_vol: "0.12"
          max_target_percent: "0.25"
          min_signal_return: "0.005"
          allow_short: true
      - name: si_vol_trend_21_63_min005
        strategy_params:
          symbol: SI
          momentum_lookback_bars: [21, 63]
          volatility_lookback_bars: 40
          target_annual_vol: "0.12"
          max_target_percent: "0.25"
          min_signal_return: "0.005"
          allow_short: true

  - id: carry_momentum_rotation_followup
    kind: backtest_matrix
    backtest_config: ../../backtest.three_strategy_carry_momentum_rotation_gc_si.yaml
    output_root: ../../../runs/research/three_strategy_gc_si/carry_momentum_rotation_followup
