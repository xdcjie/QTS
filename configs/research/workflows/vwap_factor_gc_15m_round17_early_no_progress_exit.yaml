# GC 15m VWAP round 17 matrix: online early no-progress exits for target150.
#
# Research evidence only. The exit rule uses only bars completed after entry:
# if early adverse excursion appears before enough favorable progress, flatten.

version: 1
workflow_id: vwap-factor-gc-15m-round17-early-no-progress-exit
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.vwap_factor_research_gc_15m_long_is.yaml
    output_root: ../../../runs/research/vwap/gc-15m-long/round17-early-no-progress-exit
    summary_output: ../../../runs/research/vwap/gc-15m-long/validation/round17-early-no-progress-exit.json
    metrics: [total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    base_strategy_params:
      symbol: GC
      time_window: asia_20_02
      target_quantity: "4"
      min_volume_ratio: "1.3"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "1.5"
      bad_regime_rule: hard14
      bad_regime_unready_policy: allow
      bad_regime_target_r_multiple: "1.5"
      vwap_acceptance_min: "0.75"
      ts_momentum_min_abs: "0.50"
      factor_filters: [session_sigma_range, mom120_aligned, mom120_min, vwap_acceptance_if_bad_regime]
    periods:
      - name: anchor_y2011
        start: 2011-01-01
        end: 2012-01-01
      - name: anchor_y2016
        start: 2016-01-01
        end: 2017-01-01
      - name: anchor_y2020
        start: 2020-01-01
        end: 2021-01-01
      - name: anchor_y2021
        start: 2021-01-01
        end: 2022-01-01
      - name: failure_2022_2024
        start: 2022-01-01
        end: 2025-01-01
      - name: report_2025_2026
        start: 2025-01-01
        end: 2026-04-10
    candidates:
      - name: target150
        strategy_params: {}
      - name: target150_np4_adv025_fav025
        strategy_params:
          early_no_progress_exit_bars: 4
          early_no_progress_adverse_r: "0.25"
          early_no_progress_favorable_r: "0.25"
      - name: target150_np2_adv025_fav025
        strategy_params:
          early_no_progress_exit_bars: 2
          early_no_progress_adverse_r: "0.25"
          early_no_progress_favorable_r: "0.25"
      - name: target150_np4_adv050_fav025
        strategy_params:
          early_no_progress_exit_bars: 4
          early_no_progress_adverse_r: "0.50"
          early_no_progress_favorable_r: "0.25"

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/gc-15m-long/reports
    output_path: vwap-factor-gc-15m-round17-early-no-progress-exit-report.md
