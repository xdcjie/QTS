# GC 15m VWAP round 14 matrix: exit-side controls on top of GC mom120_050.
#
# Research evidence only. The goal is to reduce failed-continuation left tail
# with online exits, not to add product/year-specific entry filters.

version: 1
workflow_id: vwap-factor-gc-15m-round14-exit-anchor-matrix
steps:
  - id: implementation
    kind: implementation_gate
    required_strategy: strategies.research.vwap_factor_research:VwapFactorResearchStrategy

  - id: matrix
    kind: backtest_matrix
    backtest_config: ../../backtest.vwap_factor_research_gc_15m_long_is.yaml
    output_root: ../../../runs/research/vwap/gc-15m-long/round14-exit-anchor
    summary_output: ../../../runs/research/vwap/gc-15m-long/validation/round14-exit-anchor.json
    metrics: [total_return, sharpe_ratio, max_drawdown, total_trades, profit_factor]
    base_strategy_params:
      symbol: GC
      time_window: asia_20_02
      target_quantity: "4"
      min_volume_ratio: "1.3"
      pullback_touch_atr_below: "0.15"
      max_pullback_break_atr: "1.0"
      stop_atr_multiple: "1.0"
      target_r_multiple: "2.0"
      bad_regime_rule: hard14
      bad_regime_unready_policy: allow
      bad_regime_target_r_multiple: "1.5"
      vwap_acceptance_min: "0.75"
      ts_momentum_min_abs: "0.50"
      factor_filters: [session_sigma_range, mom120_aligned, mom120_min, vwap_acceptance_if_bad_regime]
    periods:
      - name: anchor_y2011
        start: 2011-01-01
        end: 2012-01-01
      - name: anchor_y2016
        start: 2016-01-01
        end: 2017-01-01
      - name: anchor_y2020
        start: 2020-01-01
        end: 2021-01-01
      - name: anchor_y2021
        start: 2021-01-01
        end: 2022-01-01
      - name: failure_2022_2024
        start: 2022-01-01
        end: 2025-01-01
      - name: report_2025_2026
        start: 2025-01-01
        end: 2026-04-10
    candidates:
      - name: mom120_050
        strategy_params: {}
      - name: mom120_050_vwap_exit
        strategy_params:
          exit_on_vwap_cross: true
      - name: mom120_050_target15
        strategy_params:
          target_r_multiple: "1.5"
      - name: mom120_050_target15_vwap_exit
        strategy_params:
          target_r_multiple: "1.5"
          exit_on_vwap_cross: true

  - id: report
    kind: research_report
    output_root: ../../../runs/research/vwap/gc-15m-long/reports
    output_path: vwap-factor-gc-15m-round14-exit-anchor-report.md
