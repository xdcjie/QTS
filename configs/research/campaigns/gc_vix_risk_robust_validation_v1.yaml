campaign_id: gc_vix_risk_robust_validation_v1
owner: research
created_at: "2026-06-04T01:20:00+00:00"

universe:
  roots:
    - GC
    - VIX
  asset_class: futures
  calendar: CME
  timeframe: 1d
  dataset_id: research_futures_gc_vix_1d

families:
  - id: vix_risk
    template: vix_risk_robust
    manifest_template: configs/research/manifests/templates/gc_vix_risk_robust.yaml
    search_space: configs/research/search/gc_vix_risk_robust_best_space.yaml

execution:
  default_mode: backtest_pipeline
  metrics_source: backtest_artifacts
  data_mode: full
  start: "1990-01-01T00:00:00+00:00"
  end: "2026-06-04T00:00:00+00:00"
  fill_policy: next_bar_open
  missing_bar_policy: record_only

selection:
  selector: CandidateSelector
  gauntlet: ValidationGauntlet

launch_controls:
  paper_live_launches: disabled

objective:
  primary: composite_score
  components:
    sharpe: 0.40
    annualized_return: 0.25
    calmar: 0.20
    walk_forward_consistency: 0.10
    drawdown_penalty: -0.25
    turnover_cost_penalty: -0.10

constraints:
  min_oos_months: 24
  min_oos_trade_count: 30
  min_profit_factor: 1.15
  max_drawdown: 0.12
  max_cost_impact: 0.25
  max_correlation_to_active: 0.50

budget:
  max_generations: 1
  max_trials_per_generation: 1
  max_total_trials: 1
  max_family_trials: 1
  wall_clock_limit_minutes: 240
