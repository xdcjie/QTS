campaign_id: gc_si_momentum_alpha_research_v1
owner: research
created_at: "2026-05-28T00:00:00+00:00"

universe:
  roots:
    - GC
    - SI
  asset_class: futures
  calendar: CME
  timeframe: 1m
  dataset_id: production_futures_gc_si_1m

families:
  - id: momentum
    template: momentum
    manifest_template: configs/research/manifests/templates/gc_si_momentum.yaml
    search_space: configs/research/search/gc_si_momentum_alpha_space.yaml

execution:
  default_mode: backtest_pipeline
  metrics_source: backtest_artifacts
  data_mode: full
  windows:
    - start: "2026-01-06T23:00:00+00:00"
      end: "2026-01-07T22:00:00+00:00"
    - start: "2026-01-07T23:00:00+00:00"
      end: "2026-01-08T22:00:00+00:00"
    - start: "2026-01-13T23:00:00+00:00"
      end: "2026-01-14T22:00:00+00:00"

selection:
  selector: CandidateSelector
  gauntlet: ValidationGauntlet

launch_controls:
  paper_live_launches: disabled

objective:
  primary: composite_score
  components:
    sharpe: 0.40
    annualized_return: 0.25
    calmar: 0.20
    walk_forward_consistency: 0.10
    drawdown_penalty: -0.25
    turnover_cost_penalty: -0.10

constraints:
  min_oos_months: 12
  min_oos_trade_count: 30
  min_profit_factor: 1.15
  max_drawdown: 0.12
  max_cost_impact: 0.25
  max_correlation_to_active: 0.50

budget:
  max_generations: 2
  max_trials_per_generation: 32
  max_total_trials: 64
  max_family_trials: 64
  wall_clock_limit_minutes: 240
