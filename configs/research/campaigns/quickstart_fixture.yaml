campaign_id: quickstart_fixture
owner: research
created_at: "2026-06-02T00:00:00+00:00"

universe:
  roots: [GC, SI]
  asset_class: futures
  calendar: CME
  timeframe: 1m
  dataset_id: research_futures_gc_si_1m

families:
  - id: momentum
    template: momentum
    manifest_template: configs/research/manifests/templates/gc_si_momentum.yaml
    search_space: configs/research/search/gc_si_momentum_space.yaml

execution:
  default_mode: backtest_pipeline
  metrics_source: backtest_artifacts
  data_mode: fixture
  max_rows: 50

selection:
  selector: CandidateSelector
  gauntlet: ValidationGauntlet

launch_controls:
  paper_live_launches: disabled

objective:
  primary: composite_score
  components:
    sharpe: 0.30
    annualized_return: 0.20
    calmar: 0.20
    walk_forward_consistency: 0.15
    drawdown_penalty: -0.20

constraints:
  min_oos_months: 1
  min_oos_trade_count: 1
  min_profit_factor: 1.15
  max_drawdown: 0.25
  max_cost_impact: 0.25
  max_correlation_to_active: 0.50

budget:
  max_generations: 1
  max_trials_per_generation: 1
  max_total_trials: 1
  max_family_trials: 1
  wall_clock_limit_minutes: 10

