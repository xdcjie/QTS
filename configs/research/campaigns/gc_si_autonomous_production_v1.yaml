campaign_id: gc_si_autonomous_production_v1
owner: research
created_at: "2026-05-28T00:00:00+00:00"

universe:
  roots:
    - GC
    - SI
  asset_class: futures
  calendar: CME
  timeframe: 1m
  dataset_id: production_futures_gc_si_1m

families:
  - id: momentum
    template: momentum
    manifest_template: configs/research/manifests/templates/gc_si_momentum.yaml
    search_space: configs/research/search/gc_si_momentum_space.yaml
  - id: spread
    template: pair_spread
    manifest_template: configs/research/manifests/templates/gc_si_spread.yaml
    search_space: configs/research/search/gc_si_spread_space.yaml
  - id: breakout
    template: breakout
    manifest_template: configs/research/manifests/templates/gc_si_breakout.yaml
    search_space: configs/research/search/gc_si_breakout_space.yaml

execution:
  default_mode: backtest_pipeline
  metrics_source: backtest_artifacts
  data_mode: full
  start: "2024-01-02T00:00:00+00:00"
  end: "2024-01-09T00:00:00+00:00"

selection:
  selector: CandidateSelector
  gauntlet: ValidationGauntlet

launch_controls:
  paper_live_launches: disabled

objective:
  primary: composite_score
  components:
    sharpe: 0.30
    annualized_return: 0.20
    calmar: 0.20
    walk_forward_consistency: 0.15
    low_correlation_bonus: 0.10
    drawdown_penalty: -0.20
    turnover_cost_penalty: -0.10

constraints:
  min_oos_months: 12
  min_oos_trade_count: 1
  min_profit_factor: 1.15
  max_drawdown: 0.25
  max_cost_impact: 0.25
  max_correlation_to_active: 0.50

budget:
  max_generations: 2
  max_trials_per_generation: 15
  max_total_trials: 30
  max_family_trials: 12
  wall_clock_limit_minutes: 240
