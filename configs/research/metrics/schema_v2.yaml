schema_id: schema_v2
schema_version: 2
metrics:
  - path: trading.oos_months
    type: float
    unit: months
    direction: higher_is_better
    required_for: [promotion]
    minimum: 0.0
  - path: trading.oos_trade_count
    type: int
    unit: count
    direction: higher_is_better
    required_for: [promotion]
    minimum: 0
  - path: quality.sharpe
    type: float
    unit: ratio
    direction: higher_is_better
    required_for: [promotion]
  - path: quality.profit_factor
    type: float
    unit: ratio
    direction: higher_is_better
    required_for: [promotion]
  - path: risk.max_drawdown
    type: float
    unit: ratio
    direction: lower_is_better
    required_for: [promotion]
    minimum: 0.0
    maximum: 1.0
  - path: execution.cost_impact
    type: float
    unit: ratio
    direction: lower_is_better
    required_for: [promotion]
    minimum: 0.0
  - path: execution.slippage_sensitivity
    type: float
    unit: ratio
    direction: lower_is_better
    required_for: [promotion]
    minimum: 0.0
  - path: stability.parameter_sensitivity
    type: float
    unit: ratio
    direction: higher_is_better
    required_for: [promotion]
  - path: stability.walk_forward_consistency
    type: float
    unit: ratio
    direction: higher_is_better
    required_for: [promotion]
  - path: portfolio.correlation_to_active
    type: float
    unit: correlation
    direction: lower_is_better
    required_for: [promotion]
  - path: research.deterministic_replay_passed
    type: bool
    unit: boolean
    direction: neutral
    required_for: [promotion]
  - path: research.no_lookahead_passed
    type: bool
    unit: boolean
    direction: neutral
    required_for: [promotion]
  - path: research.promotion_eligible
    type: bool
    unit: boolean
    direction: neutral
    required_for: [promotion]
  - path: performance.train_sharpe
    type: float
    unit: ratio
    direction: higher_is_better
    required_for: []
  - path: performance.oos_sharpe
    type: float
    unit: ratio
    direction: higher_is_better
    required_for: []
  # Per-observation statistics for the multiple-testing / deflated-Sharpe
  # correction. Type-governed but not required for any purpose: the selector
  # falls back to documented defaults when they are absent.
  - path: performance.observed_sharpe
    type: float
    unit: ratio
    direction: higher_is_better
    required_for: []
  - path: performance.return_observation_count
    type: int
    unit: count
    direction: higher_is_better
    required_for: []
    minimum: 0
  - path: performance.return_skewness
    type: float
    unit: ratio
    direction: neutral
    required_for: []
  - path: performance.return_kurtosis
    type: float
    unit: ratio
    direction: neutral
    required_for: []
