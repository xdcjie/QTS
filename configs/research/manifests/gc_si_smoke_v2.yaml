schema_version: 2

run:
  id: gc-si-smoke-v2
  question: Does a canonical GC/SI momentum research run produce promotion-grade evidence?
  owner: research
  created_at: "2026-05-27T00:00:00+00:00"

strategy:
  id: gc_si_momentum
  source_module: examples.strategies.gc_si_momentum
  entrypoint: GcSiMomentumStrategy
  default_config: ../../strategies/gc_si_momentum.yaml
  hypothesis: Gold and silver short-horizon momentum can be compared through a shared evidence path.

data:
  dataset_id: research_futures_gc_si_1m
  config: ../../data/historical.local.yaml
  catalog: research_futures
  roots: [GC, SI]
  timeframe: 1m
  start: "2010-06-06T22:00:00+00:00"
  end: "2010-06-06T22:05:00+00:00"
  calendar: CME

splits:
  windows:
    - name: train
      role: in_sample
      start: "2010-06-06"
      end: "2010-06-07"
    - name: validation
      role: validation
      start: "2010-06-07"
      end: "2010-06-08"
    - name: oos
      role: out_of_sample
      start: "2010-06-08"
      end: "2010-06-09"

metrics_schema:
  id: schema_v2
  version: 2
  path: ../metrics/schema_v2.yaml

promotion_policy:
  id: default_research_policy
  version: 1
  path: ../../promotion/default.yaml

artifacts:
  required:
    - artifact_graph
    - data_quality
    - evidence_bundle
    - metrics
    - reproducibility

reproducibility:
  require_clean_git: true
  required_hash_groups:
    - config_hashes
    - data_hashes
    - dependency_hashes

parameter_grid:
  long_window: [2, 3]
  short_window: [1, 2]

random_search:
  seed: 17
  samples: 1
  parameters:
    long_window: [2, 3, 4]
    short_window: [1, 2, 3]

output_root: artifacts/research
