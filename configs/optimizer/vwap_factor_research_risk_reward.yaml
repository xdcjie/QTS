backtest_config: configs/backtest.vwap_factor_research.yaml
objective_metric: sharpe_ratio
capital_metrics:
  margin_proxy: "12000"
parameters:
  - name: factor_filters
    values:
      - [session_sigma_range, mom120_aligned]
  - name: time_window
    values: [evening_18_22]
  - name: min_volume_ratio
    values: ["1.1", "1.2"]
  - name: pullback_touch_atr_below
    values: ["0.1", "0.15", "0.2"]
  - name: max_pullback_break_atr
    values: ["1.0"]
  - name: stop_atr_multiple
    values: ["0.8", "1.0", "1.2"]
  - name: target_r_multiple
    values: ["1.5", "2.0"]
validation:
  constraints:
    - metric: total_trades
      operator: ">="
      threshold: "3"
    - metric: total_return
      operator: ">"
      threshold: "-0.001"
    - metric: pnl_usd
      operator: ">"
      threshold: "0"
    - metric: max_drawdown
      operator: "<="
      threshold: "0.05"
    - metric: sharpe_ratio
      operator: ">="
      threshold: "0"
